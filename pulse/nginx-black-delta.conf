server {
    listen 80;
    server_name black-delta.net www.black-delta.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name black-delta.net www.black-delta.net;

    ssl_certificate /etc/letsencrypt/live/black-delta.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/black-delta.net/privkey.pem;

    auth_basic "Black Delta";
    auth_basic_user_file /etc/nginx/.htpasswd-blackdelta;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
